services:
  dashboard:
    build: .
    expose:
      - "8501"
    env_file:
      - .env
    environment:
      PORT: 8501
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dashboard
    restart: unless-stopped
